<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="800" height="440" fill="#FAFAFA"/>

  <text x="400" y="40" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="20"
        font-weight="700">One series or stream per unique label combination</text>

  <!-- Metrics panel -->
  <rect x="40" y="70" width="720" height="150" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="60" y="98" fill="#1A1A1A" font-family="Inter, system-ui, sans-serif"
        font-size="14" font-weight="700">Time series (metrics)</text>

  <text x="70" y="140" font-family="'Roboto Mono', Menlo, monospace" font-size="15">
    <tspan fill="#3B78E7">http_requests_total</tspan><tspan fill="#F46800">{method="GET", status="200", env="prod"}</tspan>
  </text>

  <line x1="70" y1="152" x2="241" y2="152" stroke="#3B78E7" stroke-width="2"/>
  <line x1="247" y1="152" x2="601" y2="152" stroke="#F46800" stroke-width="2"/>

  <text x="155" y="172" text-anchor="middle" fill="#3B78E7"
        font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Metric name</text>
  <text x="424" y="172" text-anchor="middle" fill="#F46800"
        font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Labels: key-value pairs</text>

  <text x="400" y="202" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="13">Each unique combination of label values is one active series</text>

  <!-- Logs panel -->
  <rect x="40" y="250" width="720" height="150" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="60" y="278" fill="#1A1A1A" font-family="Inter, system-ui, sans-serif"
        font-size="14" font-weight="700">Log stream (logs)</text>

  <text x="70" y="320" font-family="'Roboto Mono', Menlo, monospace" font-size="15">
    <tspan fill="#9CA3AF">2026-07-17T10:01:02Z</tspan><tspan fill="#464C54"> </tspan><tspan fill="#F46800">{app="nginx", env="prod"}</tspan><tspan fill="#464C54"> GET /about</tspan>
  </text>

  <line x1="70" y1="332" x2="250" y2="332" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="259" y1="332" x2="484" y2="332" stroke="#F46800" stroke-width="2"/>
  <line x1="493" y1="332" x2="583" y2="332" stroke="#464C54" stroke-width="2"/>

  <text x="160" y="352" text-anchor="middle" fill="#9CA3AF"
        font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Timestamp</text>
  <text x="371" y="352" text-anchor="middle" fill="#F46800"
        font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Labels: indexed</text>
  <text x="538" y="352" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Log line: not indexed</text>

  <text x="400" y="382" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="13">Each unique combination of label values is one log stream</text>
</svg>
