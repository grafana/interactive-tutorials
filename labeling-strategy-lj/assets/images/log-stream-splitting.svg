<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,12 L12,6 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <rect width="800" height="470" fill="#FAFAFA"/>

  <text x="400" y="40" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="20"
        font-weight="700">Every label combination splits your logs into another stream</text>

  <!-- Source: one application -->
  <rect x="60" y="190" width="180" height="80" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="150" y="225" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">One application</text>
  <text x="150" y="250" text-anchor="middle" fill="#464C54"
        font-family="'Roboto Mono', Menlo, monospace" font-size="12">app="api"</text>

  <!-- Arrows to streams -->
  <line x1="240" y1="230" x2="330" y2="110" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="230" x2="330" y2="190" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="230" x2="330" y2="270" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="230" x2="330" y2="350" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Streams -->
  <rect x="335" y="80" width="340" height="60" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="505" y="105" text-anchor="middle" fill="#F46800"
        font-family="'Roboto Mono', Menlo, monospace" font-size="12">{app="api", env="prod", level="info"}</text>
  <text x="505" y="127" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="12">Stream 1</text>

  <rect x="335" y="160" width="340" height="60" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="505" y="185" text-anchor="middle" fill="#F46800"
        font-family="'Roboto Mono', Menlo, monospace" font-size="12">{app="api", env="prod", level="error"}</text>
  <text x="505" y="207" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="12">Stream 2</text>

  <rect x="335" y="240" width="340" height="60" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="505" y="265" text-anchor="middle" fill="#F46800"
        font-family="'Roboto Mono', Menlo, monospace" font-size="12">{app="api", env="dev", level="info"}</text>
  <text x="505" y="287" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="12">Stream 3</text>

  <rect x="335" y="320" width="340" height="60" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="505" y="345" text-anchor="middle" fill="#F46800"
        font-family="'Roboto Mono', Menlo, monospace" font-size="12">{app="api", env="dev", level="error"}</text>
  <text x="505" y="367" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="12">Stream 4</text>

  <text x="400" y="425" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="14">Two labels with two values each: four streams, four sets of chunks to store and query.</text>
  <text x="400" y="449" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="14">Each stream is indexed, batched, and stored separately.</text>
</svg>
