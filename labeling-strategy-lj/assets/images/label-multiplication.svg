<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,12 L12,6 z" fill="#F46800"/>
    </marker>
  </defs>

  <rect width="800" height="460" fill="#FAFAFA"/>

  <text x="400" y="40" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="20"
        font-weight="700">Label values multiply into series</text>

  <!-- Row 1: two labels -->
  <rect x="50" y="80" width="180" height="110" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="140" y="106" text-anchor="middle" fill="#3B78E7"
        font-family="'Roboto Mono', Menlo, monospace" font-size="14" font-weight="700">status</text>
  <text x="140" y="132" text-anchor="middle" fill="#464C54"
        font-family="'Roboto Mono', Menlo, monospace" font-size="12">200, 404, 500</text>
  <text x="140" y="170" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">3 values</text>

  <text x="265" y="142" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">&#215;</text>

  <rect x="300" y="80" width="200" height="110" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="400" y="106" text-anchor="middle" fill="#3B78E7"
        font-family="'Roboto Mono', Menlo, monospace" font-size="14" font-weight="700">action</text>
  <text x="400" y="132" text-anchor="middle" fill="#464C54"
        font-family="'Roboto Mono', Menlo, monospace" font-size="11">GET, POST, PUT,</text>
  <text x="400" y="148" text-anchor="middle" fill="#464C54"
        font-family="'Roboto Mono', Menlo, monospace" font-size="11">PATCH, DELETE</text>
  <text x="400" y="176" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">5 values</text>

  <text x="540" y="142" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">=</text>

  <rect x="580" y="80" width="170" height="110" rx="8" fill="#56C0A7" filter="url(#shadow)"/>
  <text x="665" y="128" text-anchor="middle" fill="#FFFFFF"
        font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">15</text>
  <text x="665" y="156" text-anchor="middle" fill="#FFFFFF"
        font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">unique series</text>

  <!-- Divider arrow -->
  <line x1="400" y1="212" x2="400" y2="240" stroke="#F46800" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="418" y="232" fill="#F46800"
        font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Add one more label</text>

  <!-- Row 2: three labels -->
  <rect x="50" y="260" width="130" height="110" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="115" y="286" text-anchor="middle" fill="#3B78E7"
        font-family="'Roboto Mono', Menlo, monospace" font-size="14" font-weight="700">status</text>
  <text x="115" y="330" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">3 values</text>

  <text x="205" y="322" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">&#215;</text>

  <rect x="230" y="260" width="130" height="110" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="295" y="286" text-anchor="middle" fill="#3B78E7"
        font-family="'Roboto Mono', Menlo, monospace" font-size="14" font-weight="700">action</text>
  <text x="295" y="330" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">5 values</text>

  <text x="385" y="322" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">&#215;</text>

  <rect x="410" y="260" width="130" height="110" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="475" y="286" text-anchor="middle" fill="#3B78E7"
        font-family="'Roboto Mono', Menlo, monospace" font-size="14" font-weight="700">endpoint</text>
  <text x="475" y="330" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">3 values</text>

  <text x="565" y="322" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">=</text>

  <rect x="590" y="260" width="160" height="110" rx="8" fill="#F46800" filter="url(#shadow)"/>
  <text x="670" y="308" text-anchor="middle" fill="#FFFFFF"
        font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">45</text>
  <text x="670" y="336" text-anchor="middle" fill="#FFFFFF"
        font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">unique series</text>

  <text x="400" y="420" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="14">One added label tripled the series count. You pay for every one.</text>
</svg>
