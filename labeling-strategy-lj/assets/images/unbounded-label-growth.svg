<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="800" height="440" fill="#FAFAFA"/>

  <text x="400" y="40" text-anchor="middle" fill="#1A1A1A"
        font-family="Inter, system-ui, sans-serif" font-size="20"
        font-weight="700">Bounded and unbounded label values over time</text>

  <!-- Chart area -->
  <rect x="90" y="80" width="620" height="270" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Axes -->
  <line x1="130" y1="320" x2="680" y2="320" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="130" y1="110" x2="130" y2="320" stroke="#9CA3AF" stroke-width="2"/>

  <text x="405" y="344" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="12">Time</text>
  <text x="112" y="215" text-anchor="middle" fill="#464C54" transform="rotate(-90 112 215)"
        font-family="Inter, system-ui, sans-serif" font-size="12">Active series</text>

  <!-- Bounded label: flat line -->
  <path d="M 130 300 L 220 296 L 330 294 L 450 292 L 560 291 L 670 290"
        fill="none" stroke="#56C0A7" stroke-width="3"/>
  <text x="540" y="278" fill="#56C0A7"
        font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">env="prod": bounded</text>

  <!-- Unbounded label: exploding curve -->
  <path d="M 130 300 C 300 290, 420 270, 500 220 C 560 180, 620 140, 670 115"
        fill="none" stroke="#EF4444" stroke-width="3"/>
  <text x="370" y="170" fill="#EF4444"
        font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">user_id="...": unbounded</text>

  <text x="400" y="390" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="14">A bounded label stays flat. An unbounded label creates a new series for every new value.</text>
  <text x="400" y="414" text-anchor="middle" fill="#464C54"
        font-family="Inter, system-ui, sans-serif" font-size="14">Every unique user, request, or IP address becomes another series you pay for.</text>
</svg>
