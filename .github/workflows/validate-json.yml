name: Validate JSON Files

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-recommender-rules:
    name: Validate Recommender Rules (index.json)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        persist-credentials: false
        submodules: false
      
    - name: Checkout validation scripts from main
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        ref: main
        sparse-checkout: |
          .github/scripts/
        sparse-checkout-cone-mode: false
        path: .github-trusted
        persist-credentials: false
      
    - name: Validate index.json
      run: |
        echo "Validating index.json for well-formed JSON..."
        
        # Check if index.json exists
        if [ ! -f "index.json" ]; then
          echo "❌ Error: index.json file not found"
          exit 1
        fi
        
        # Validate JSON using the validation script
        python3 .github-trusted/.github/scripts/validate_json.py index.json
        
        if [ $? -eq 0 ]; then
          echo "🎉 All validations passed! index.json is well-formed and properly structured."
        else
          echo "❌ JSON validation failed!"
          exit 1
        fi

  validate-packages:
    name: Validate Interactive Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        persist-credentials: false
        submodules: false

    - name: Checkout pathfinder-app CLI
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        repository: grafana/grafana-pathfinder-app
        ref: main
        path: pathfinder-app
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: pathfinder-app/package-lock.json

    - name: Install dependencies
      working-directory: pathfinder-app
      run: npm ci

    - name: Build CLI
      working-directory: pathfinder-app
      run: npm run build:cli

    # NOTE: this validates _only directories with content.json_
    # Post-migration, if all directories are enforced to have manifest.json, this
    # job can be removed as redundant to the other validate-packages job.
    - name: Validate content.json
      run: |
        echo "🔍 Finding and validating content.json files..."
        echo ""
        
        PASSED=0
        FAILED=0
        
        # Find and iterate through each content.json file
        while IFS= read -r file; do
          if [ -n "$file" ]; then
            echo "📄 Validating: $file"
            
            if node pathfinder-app/dist/cli/cli/index.js validate --strict "$file"; then
              PASSED=$((PASSED + 1))
            else
              echo "❌ Validation failed for: $file"
              echo ""
              FAILED=$((FAILED + 1))
            fi
          fi
        done < <(find . -name "content.json" -type f \
                   -not -path "./pathfinder-app/*" \
                   -not -path "./shared/*")
        
        echo ""
        echo "📊 Validation Summary:"
        echo "  ✅ Passed: $PASSED"
        echo "  ❌ Failed: $FAILED"
        
        if [ $FAILED -gt 0 ]; then
          echo ""
          echo "❌ $FAILED guide(s) failed validation!"
          exit 1
        else
          echo ""
          echo "🎉 All $PASSED guide(s) validated successfully!"
        fi

    # Fails when a guide directory has content.json but no manifest.json. Migration is
    # complete; all guides must be in the package format. Each missing file emits a
    # ::warning:: annotation, then the step exits non-zero.
    - name: Check for missing manifest.json
      run: |
        MISSING=0

        while IFS= read -r content_file; do
          dir="$(dirname "$content_file")"
          if [ ! -f "$dir/manifest.json" ]; then
            echo "::warning file=${content_file}::manifest.json missing — this guide has not been migrated to the package format"
            MISSING=$((MISSING + 1))
          fi
        done < <(find . -name "content.json" -type f \
                   -not -path "./pathfinder-app/*" \
                   -not -path "./shared/*" \
                   -not -path "./.git/*")

        echo ""
        if [ "$MISSING" -gt 0 ]; then
          echo "❌ $MISSING guide(s) are missing manifest.json (migration incomplete)"
          exit 1
        else
          echo "✅ All guides have manifest.json"
        fi

    # Warns when a manifest.json with type "guide" (at the repo root level, not inside an
    # *-lj directory) or type "path" is missing a "targeting" field. Without targeting the
    # package cannot be contextually recommended. LJ step guides intentionally omit targeting
    # (targeting lives at the path level), so they are excluded from this check.
    # Each missing field emits a ::warning:: annotation visible in the PR Annotations panel.
    # TO ENFORCE: uncomment the `exit 1` line below once all packages have been reviewed.
    - name: Check for missing targeting in manifest.json (warning)
      run: |
        MISSING=0

        while IFS= read -r manifest_file; do
          dir="$(dirname "$manifest_file")"
          parent="$(dirname "$dir")"

          # Skip if targeting is already present
          if jq -e 'has("targeting")' "$manifest_file" > /dev/null 2>&1; then
            continue
          fi

          # LJ step guides: parent directory ends in -lj — targeting lives at path level, skip
          if echo "$parent" | grep -qE '\-lj$'; then
            continue
          fi

          echo "::warning file=${manifest_file#./}::${manifest_file#./}: targeting missing — this package has no contextual recommendation rules and will never be recommended"
          MISSING=$((MISSING + 1))
        done < <(find . -name "manifest.json" -type f \
                   -not -path "./pathfinder-app/*" \
                   -not -path "./shared/*" \
                   -not -path "./.git/*")

        echo ""
        if [ "$MISSING" -gt 0 ]; then
          echo "⚠️  $MISSING package(s) are missing targeting in manifest.json"
          # TO ENFORCE: uncomment the following line once all packages have been reviewed
          # exit 1
        else
          echo "✅ All packages have targeting defined"
        fi

    # NOTE: validate --packages does not support --exclude, so we enumerate
    # package directories from manifest.json files and validate each directory.
    - name: Validate Pathfinder Packages
      run: |
        echo "🔍 Validating package directories (excluding pathfinder-app and shared)..."
        echo ""
        PASSED=0
        FAILED=0

        while IFS= read -r manifest_file; do
          if [ -n "$manifest_file" ]; then
            dir="$(dirname "$manifest_file")"
            echo "📦 Validating package: $dir"

            if node pathfinder-app/dist/cli/cli/index.js validate --package "$dir"; then
              PASSED=$((PASSED + 1))
            else
              echo "❌ Package validation failed: $dir"
              FAILED=$((FAILED + 1))
            fi
          fi
        done < <(find . -name "manifest.json" -type f \
                   -not -path "./pathfinder-app/*" \
                   -not -path "./shared/*" \
                   -not -path "./.git/*")

        echo ""
        echo "📊 Package validation summary:"
        echo "  ✅ Passed: $PASSED"
        echo "  ❌ Failed: $FAILED"

        if [ "$FAILED" -gt 0 ]; then
          echo ""
          echo "❌ $FAILED package(s) failed validation"
          exit 1
        fi

    - name: Build repository.json
      run: |
        echo "🔨 Generating repository.json from all packages..."
        echo ""
        # --exclude pathfinder-app: prevents the scanner from indexing bundled guides that
        # ship inside the pathfinder-app checkout at ./pathfinder-app/.
        node pathfinder-app/dist/cli/cli/index.js build-repository . --exclude pathfinder-app --exclude shared -o repository.json
        echo ""
        echo "📦 repository.json generated successfully"

    - name: Build dependency graph
      continue-on-error: true
      run: |
        echo "🔗 Building dependency graph..."
        echo ""
        node pathfinder-app/dist/cli/cli/index.js build-graph interactive-tutorials:repository.json

    - name: Upload repository.json and graph.json artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: repository-and-graph-json
        path: |
          repository.json
          graph.json
        retention-days: 30
