<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#11141A"/>
    </marker>
  </defs>

  <rect width="960" height="320" fill="#FFFFFF"/>

  <text x="480" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#11141A">Three eras of Pathfinder</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#6B7280">Nov 2025 → May 2026 · six months</text>

  <!-- Era 1 -->
  <rect x="40" y="110" width="260" height="120" rx="14" fill="#F4F5F5" stroke="#D1D5DB"/>
  <text x="170" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#6B7280">ERA 1</text>
  <text x="170" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#11141A">Docs in product</text>
  <text x="170" y="194" text-anchor="middle" font-size="12" fill="#374151">HTML guides · sidebar reader</text>
  <text x="170" y="214" text-anchor="middle" font-size="12" fill="#9CA3AF">v1.1.60</text>

  <!-- Arrow 1 -->
  <line x1="306" y1="170" x2="346" y2="170" stroke="#11141A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Era 2 -->
  <rect x="350" y="110" width="260" height="120" rx="14" fill="#FFF1E5" stroke="#F46800"/>
  <text x="480" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#F46800">ERA 2</text>
  <text x="480" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#11141A">Show me / Do it</text>
  <text x="480" y="194" text-anchor="middle" font-size="12" fill="#374151">JSON guides · automated actions</text>
  <text x="480" y="214" text-anchor="middle" font-size="12" fill="#9CA3AF">v1.1.74 → v2.0.0</text>

  <!-- Arrow 2 -->
  <line x1="616" y1="170" x2="656" y2="170" stroke="#11141A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Era 3 -->
  <rect x="660" y="110" width="260" height="120" rx="14" fill="#11141A" stroke="#11141A"/>
  <text x="790" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#F46800">ERA 3 · YOU ARE HERE</text>
  <text x="790" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">Guided steps</text>
  <text x="790" y="194" text-anchor="middle" font-size="12" fill="#E5E7EB">Resilient selectors · MCP · Kiosk</text>
  <text x="790" y="214" text-anchor="middle" font-size="12" fill="#9CA3AF">v2.5.0 → v2.10.0</text>

  <!-- Bottom milestones rail -->
  <line x1="40" y1="270" x2="920" y2="270" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="170" cy="270" r="5" fill="#6B7280"/>
  <circle cx="480" cy="270" r="5" fill="#F46800"/>
  <circle cx="790" cy="270" r="5" fill="#F46800"/>

  <text x="170" y="294" text-anchor="middle" font-size="11" fill="#6B7280">Sidebar · HTML</text>
  <text x="480" y="294" text-anchor="middle" font-size="11" fill="#374151">JSON · Go backend · MCP</text>
  <text x="790" y="294" text-anchor="middle" font-size="11" fill="#374151">Auto-recovery · Coda</text>
</svg>
