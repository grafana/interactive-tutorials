<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Inter, system-ui, sans-serif">
  <rect width="960" height="420" fill="#FFFFFF"/>

  <text x="480" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#11141A">Auto-recovery: a graduated ladder</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#6B7280">Try the cheapest fix first. Escalate only when you have to.</text>

  <!-- Vertical bar tying steps -->
  <line x1="100" y1="120" x2="100" y2="380" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Level 0 -->
  <circle cx="100" cy="130" r="14" fill="#10B981"/>
  <text x="100" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">0</text>
  <rect x="140" y="108" width="780" height="48" rx="10" fill="#F0FDF4" stroke="#10B981"/>
  <text x="160" y="132" font-size="14" font-weight="700" fill="#11141A">Silent auto-fix</text>
  <text x="160" y="149" font-size="12" fill="#374151">Resolve the selector with retry/exponential backoff. User never knows it almost broke.</text>

  <!-- Level 1 -->
  <circle cx="100" cy="180" r="14" fill="#84CC16"/>
  <text x="100" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
  <rect x="140" y="158" width="780" height="48" rx="10" fill="#F7FEE7" stroke="#84CC16"/>
  <text x="160" y="182" font-size="14" font-weight="700" fill="#11141A">Prompted fix</text>
  <text x="160" y="199" font-size="12" fill="#374151">Lightweight nudge: "Looks like the page changed — click here to keep going."</text>

  <!-- Level 2 -->
  <circle cx="100" cy="230" r="14" fill="#F59E0B"/>
  <text x="100" y="235" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
  <rect x="140" y="208" width="780" height="48" rx="10" fill="#FFFBEB" stroke="#F59E0B"/>
  <text x="160" y="232" font-size="14" font-weight="700" fill="#11141A">Guided rescue</text>
  <text x="160" y="249" font-size="12" fill="#374151">Modal walks the user back into a known state with reframed instructions.</text>

  <!-- Level 3 -->
  <circle cx="100" cy="280" r="14" fill="#F46800"/>
  <text x="100" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
  <rect x="140" y="258" width="780" height="48" rx="10" fill="#FFF1E5" stroke="#F46800"/>
  <text x="160" y="282" font-size="14" font-weight="700" fill="#11141A">Checkpoint restart</text>
  <text x="160" y="299" font-size="12" fill="#374151">Snap back to the last known-good step in this section.</text>

  <!-- Level 4 -->
  <circle cx="100" cy="330" r="14" fill="#DC2626"/>
  <text x="100" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
  <rect x="140" y="308" width="780" height="48" rx="10" fill="#FEF2F2" stroke="#DC2626"/>
  <text x="160" y="332" font-size="14" font-weight="700" fill="#11141A">Section reset</text>
  <text x="160" y="349" font-size="12" fill="#374151">Last resort. Reset the whole section, keep the user in the guide.</text>

  <text x="100" y="395" text-anchor="middle" font-size="11" fill="#6B7280">cheap</text>
  <text x="100" y="395" font-size="11" fill="#6B7280" transform="translate(0,0)"></text>

  <text x="940" y="395" text-anchor="end" font-size="11" fill="#6B7280">expensive</text>

  <text x="480" y="395" text-anchor="middle" font-size="11" font-style="italic" fill="#374151">Source: docs/design/AUTORECOVERY_DESIGN.md (Feb 2026)</text>
</svg>
