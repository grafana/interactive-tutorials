<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#11141A"/>
    </marker>
  </defs>

  <rect width="960" height="460" fill="#FFFFFF"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#11141A">Coda: safe-compute for learners</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#6B7280">Pathfinder asks for a VM · 35 seconds later the user is in it</text>

  <!-- Pathfinder -->
  <rect x="40" y="100" width="180" height="80" rx="14" fill="#FFF1E5" stroke="#F46800" stroke-width="2"/>
  <text x="130" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#11141A">Pathfinder UI</text>
  <text x="130" y="150" text-anchor="middle" font-size="11" fill="#6B7280">terminal block</text>
  <text x="130" y="166" text-anchor="middle" font-size="11" fill="#6B7280">+ guided steps</text>

  <line x1="220" y1="140" x2="270" y2="140" stroke="#11141A" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- Coda Server -->
  <rect x="272" y="100" width="180" height="80" rx="14" fill="#F4F5F5" stroke="#11141A" stroke-width="2"/>
  <text x="362" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#11141A">Coda Server</text>
  <text x="362" y="150" text-anchor="middle" font-size="11" fill="#6B7280">REST API · auth</text>
  <text x="362" y="166" text-anchor="middle" font-size="11" fill="#6B7280">PostgreSQL state</text>

  <line x1="452" y1="140" x2="502" y2="140" stroke="#11141A" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- Job Manager -->
  <rect x="504" y="100" width="180" height="80" rx="14" fill="#F4F5F5" stroke="#11141A" stroke-width="2"/>
  <text x="594" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#11141A">Job Manager</text>
  <text x="594" y="150" text-anchor="middle" font-size="11" fill="#6B7280">K8s webhook</text>
  <text x="594" y="166" text-anchor="middle" font-size="11" fill="#6B7280">spawns jobs</text>

  <line x1="684" y1="140" x2="734" y2="140" stroke="#11141A" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- Runner -->
  <rect x="736" y="100" width="180" height="80" rx="14" fill="#F4F5F5" stroke="#11141A" stroke-width="2"/>
  <text x="826" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#11141A">Runner (wsa)</text>
  <text x="826" y="150" text-anchor="middle" font-size="11" fill="#6B7280">Terraform · Jsonnet</text>
  <text x="826" y="166" text-anchor="middle" font-size="11" fill="#6B7280">provisions infra</text>

  <!-- Down arrow from Runner to AWS -->
  <line x1="826" y1="180" x2="826" y2="240" stroke="#11141A" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- AWS EC2 VM -->
  <rect x="700" y="246" width="220" height="80" rx="14" fill="#11141A"/>
  <text x="810" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">AWS EC2 VM</text>
  <text x="810" y="296" text-anchor="middle" font-size="11" fill="#9CA3AF">Packer-baked image</text>
  <text x="810" y="312" text-anchor="middle" font-size="11" fill="#9CA3AF">30-min lifetime</text>

  <!-- Relay tunnel: from Pathfinder UI down and across to AWS VM -->
  <path d="M130 180 L130 360 L810 360 L810 326" fill="none" stroke="#F46800" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ar3)"/>

  <!-- Relay box on the tunnel -->
  <rect x="380" y="338" width="200" height="44" rx="10" fill="#FFFFFF" stroke="#F46800" stroke-width="2"/>
  <text x="480" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#F46800">Relay</text>
  <text x="480" y="374" text-anchor="middle" font-size="11" fill="#6B7280">WebSocket → TCP · SSH tunnel</text>

  <text x="480" y="416" text-anchor="middle" font-size="12" font-style="italic" fill="#6B7280">Built on Brokkr · POC working today on AWS EKS</text>
</svg>
